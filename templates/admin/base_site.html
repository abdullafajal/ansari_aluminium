{% extends "admin/base.html" %}
{% load static %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">
    <img src="{% static 'assets/icons/logo-cream-gold.png' %}" alt="Ansari Aluminium" height="24" style="height: 24px; vertical-align: middle; margin-right: 10px;">
    Ansari Aluminium Administration
</a></h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    :root {
        /* Primary - Charcoal */
        --primary: #0F0F1A;
        --primary-fg: #F5F0E8;
        
        /* Secondary - Gold */
        --secondary: #D4A853;
        --accent: #D4A853;
        
        /* Header */
        --header-bg: var(--primary);
        --header-color: var(--primary-fg);
        --header-link-color: var(--primary-fg);
        
        /* Links */
        --link-fg: var(--secondary);
        --link-hover-color: #E0BC72;
        --link-selected-fg: #E0BC72;
        
        /* Buttons */
        --button-bg: var(--secondary);
        --button-fg: var(--primary);
        --button-hover-bg: #E0BC72; 
        --default-button-bg: var(--secondary);
        --default-button-hover-bg: #E0BC72; 
        
        /* Modules */
        --module-bg: #fff;
        --module-hover-bg: #F6F8FB; 
        
        /* Sidebar */
        --sidebar-bg: #1A1A2E;
        --sidebar-link-fg: #F5F0E8;
        --sidebar-link-selected-bg: #16213E;
    }
    
    /* Login Page Specifics */
    body.login {
        background: #1A1A2E;
    }
    
    body.login #header {
        background: var(--primary);
    }
    
    .login .submit-row input {
        background: var(--secondary);
        color: var(--primary);
    }
    
    .login .submit-row input:hover {
        background: var(--button-hover-bg);
    }
    
    /* Logo styling in header (removed invert since logo has dark/gold colors now, just ensure it scales right) */
    #site-name img {
        display: inline-block;
    }
</style>
{% endblock %}
