{% extends "admin/login.html" %}
{% load static %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">
    <img src="{% static 'assets/icons/logo-cream-gold.png' %}" alt="Ansari Aluminium" height="24" style="height: 24px; vertical-align: middle; margin-right: 10px;">
    Ansari Aluminium Administration
</a></h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    :root {
        /* Primary - Charcoal */
        --primary: #0F0F1A;
        /* Secondary - Gold */
        --secondary: #D4A853;
    }
    
    body {
        background-color: #1A1A2E; /* Dark background */
    }
    
    #header {
        background: var(--primary);
        color: #F5F0E8;
    }
    
    .submit-row input[type=submit] {
        background: var(--secondary);
        color: #0F0F1A;
        text-transform: uppercase;
        font-weight: bold;
        transition: background-color 0.3s;
    }
    
    .submit-row input[type=submit]:hover {
        background: #E0BC72;
    }
    
    #branding h1 a {
        color: #F5F0E8;
    }
</style>
{% endblock %}
